# Party Automation Rules for MCP Gateway (v5 Three-Tier Governance)
#
# Maps JWT claims to NPL protocol parties.
# Party names use 'p' prefix to distinguish from JWT claim roles.
#
# Hierarchy:
# - pAdmin: Organization administrators (policy management)
# - pGateway: Gateway system service (runtime policy enforcement)
# - pApprover: Users who can approve workflow requests

# ============================================================================
# GatewayStore (unified singleton for catalog + access rules)
# ============================================================================

store.GatewayStore:
  pAdmin:
    set:
      claims:
        role:
          - admin
  pGateway:
    set:
      claims:
        role:
          - gateway

# ============================================================================
# Guardrails (Tier 2: constraints + allowlists, in-memory evaluation)
# ============================================================================

governance.Guardrails:
  pAdmin:
    set:
      claims:
        role:
          - admin
  pGateway:
    set:
      claims:
        role:
          - gateway

# ============================================================================
# Workflow (Tier 3: approval state machine)
# ============================================================================

governance.Workflow:
  pAdmin:
    set:
      claims:
        role:
          - admin
  pGateway:
    set:
      claims:
        role:
          - gateway
  pApprover:
    set:
      claims:
        role:
          - approver

# ============================================================================
# ToolAuthorization (one-shot workflow-gated overrides)
# ============================================================================

governance.ToolAuthorization:
  pUser:
    set:
      claims:
        role:
          - user
          - admin
          - approver
  pGateway:
    set:
      claims:
        role:
          - gateway
